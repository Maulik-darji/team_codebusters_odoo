<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar and Navbar will be injected by app.js -->
        <aside id="sidebar"></aside>
        
        <div id="main-panel">
            <header id="navbar"></header>
            
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Inventory Overview</h1>
                        <p class="text-muted">Real-time stock analytics and movements</p>
                    </div>
                    <div class="flex gap-2">
                        <select class="form-control" style="width: auto;" id="warehouse-filter">
                            <option value="all">All Warehouses</option>
                        </select>
                    </div>
                </div>

                <!-- KPI Cards -->
                <div class="kpi-grid">
                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: var(--primary-light); color: var(--primary);">
                            <i data-lucide="package"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Total Stock</h3>
                            <div class="value" id="kpi-total-stock">0</div>
                        </div>
                    </div>
                    
                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: #fff3cd; color: #856404;">
                            <i data-lucide="alert-triangle"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Low Stock</h3>
                            <div class="value" id="kpi-low-stock">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: #f8d7da; color: #721c24;">
                            <i data-lucide="x-circle"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Out of Stock</h3>
                            <div class="value" id="kpi-out-stock">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: #e7f3ff; color: #004085;">
                            <i data-lucide="arrow-down-to-line"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Pending Receipts</h3>
                            <div class="value" id="kpi-pending-receipts">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: var(--primary-light); color: var(--primary);">
                            <i data-lucide="arrow-up-from-line"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Pending Delivery</h3>
                            <div class="value" id="kpi-pending-delivery">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: #f3f4f6; color: #374151;">
                            <i data-lucide="arrow-right-left"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Scheduled Transfers</h3>
                            <div class="value" id="kpi-scheduled-transfers">0</div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem;">Recent Movement Ledger</h2>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Operation</th>
                                    <th>Product</th>
                                    <th>Qty Change</th>
                                    <th>Location</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="recent-movements">
                                <!-- Ledger rows will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
