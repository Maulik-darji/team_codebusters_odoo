<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move History - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Stock Movement History</h1>
                        <p class="text-muted">Complete audit trail of all inventory operations</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <div class="form-group mb-0" style="margin-bottom: 0;">
                            <label style="font-size: 0.75rem;">From:</label>
                            <input type="date" id="start-date" style="height: 32px;">
                        </div>
                        <div class="form-group mb-0" style="margin-bottom: 0;">
                            <label style="font-size: 0.75rem;">To:</label>
                            <input type="date" id="end-date" style="height: 32px;">
                        </div>
                        <div class="form-group mb-0" style="margin-bottom: 0;">
                            <label style="font-size: 0.75rem;">Type:</label>
                            <select id="type-filter" style="height: 32px;">
                                <option value="">All Types</option>
                                <option value="Receipt">Receipts</option>
                                <option value="Delivery">Deliveries</option>
                                <option value="Transfer">Transfers</option>
                                <option value="Adjustment">Adjustments</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="apply-filter" style="height: 32px; margin-top: 15px;">Filter</button>
                    </div>
                </div>

                <div class="card" style="padding: 0;">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Ref</th>
                                    <th>Type</th>
                                    <th>Product</th>
                                    <th>Qty Change</th>
                                    <th>Location</th>
                                    <th>Partner</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="history-list"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/history.js"></script>

</body>
</html>
