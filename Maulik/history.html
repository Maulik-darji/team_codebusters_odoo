<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move History - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="mb-4" style="margin-bottom: 2rem;">
                    <h1 style="font-size: 1.5rem; font-weight: 700;">Stock Movement History</h1>
                    <p class="text-muted">Complete audit trail of all inventory operations</p>
                </div>

                <div class="card" style="padding: 0;">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Ref</th>
                                    <th>Type</th>
                                    <th>Product</th>
                                    <th>Qty Change</th>
                                    <th>Location</th>
                                    <th>Partner</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="history-list"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module">
        import Storage from './js/storage.js';
        
        async function renderHistory() {
            const list = document.getElementById('history-list');
            const movements = await Storage.getMovements();
            
            if (!list) return;
            list.innerHTML = movements.length ? '' : '<tr><td colspan="8" style="text-align:center; padding: 2.5rem;">No history records found.</td></tr>';

            movements.forEach(m => {
                const row = document.createElement('tr');
                const typeColor = {
                    'Receipt': 'var(--success)',
                    'Delivery': 'var(--primary)',
                    'Transfer': 'var(--info)',
                    'Adjustment': 'var(--warning)'
                }[m.type] || 'black';

                row.innerHTML = `
                    <td>${m.date}</td>
                    <td style="font-family: monospace; font-size: 0.85rem; font-weight: 600;">${m.id}</td>
                    <td style="color: ${typeColor}; font-weight: 700;">${m.type}</td>
                    <td style="font-weight: 600;">${m.productName}</td>
                    <td style="font-weight: 700;">${m.quantity > 0 ? '+' : ''}${m.quantity}</td>
                    <td>${m.location}</td>
                    <td>${m.partner || '-'}</td>
                    <td><span class="badge ${m.status === 'Done' ? 'badge-success' : 'badge-warning'}">${m.status}</span></td>
                `;
                list.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', renderHistory);
    </script>
</body>
</html>
