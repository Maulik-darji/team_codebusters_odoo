<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="mb-4" style="margin-bottom: 2rem;">
                    <h1 style="font-size: 1.5rem; font-weight: 700;">User Profile</h1>
                    <p class="text-muted">Manage your account and security settings</p>
                </div>
                <div class="grid-cards" style="grid-template-columns: 1fr 1fr;">
                    <!-- Profile Info -->
                    <div class="card">
                        <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem;">Personal Information</h2>
                        <form id="profile-form">
                            <div class="form-group">
                                <label>Username / Login ID</label>
                                <input type="text" id="p-username" readonly style="background: var(--input-readonly); cursor: not-allowed;">
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="p-email" readonly style="background: var(--input-readonly); cursor: not-allowed;">
                                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Email cannot be changed currently.</p>
                            </div>
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="p-fullname" placeholder="Enter your full name">
                            </div>
                            <div style="margin-top: 1.5rem;">
                                <button type="submit" class="btn btn-primary">Update Profile</button>
                            </div>
                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="card">
                        <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem;">Security</h2>
                        <form id="password-form">
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="new-password" required placeholder="Min 6 characters">
                            </div>
                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <input type="password" id="confirm-password" required placeholder="Repeat new password">
                            </div>
                            <div id="password-error" class="hidden" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem;">
                                Passwords do not match.
                            </div>
                            <div style="margin-top: 1.5rem;">
                                <button type="submit" class="btn btn-light" style="border-color: var(--primary); color: var(--primary);">Change Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
