<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="mb-4" style="margin-bottom: 2rem;">
                    <h1 style="font-size: 1.5rem; font-weight: 700;">System Settings</h1>
                    <p class="text-muted">Manage locations, categories, and system defaults</p>
                </div>

                <div class="grid-cards" style="grid-template-columns: 2fr 1fr;">
                    <!-- Warehouses -->
                    <div class="card">
                        <div class="flex-between mb-2" style="margin-bottom: 1rem;">
                            <h2 style="font-size: 1.1rem; font-weight: 700;">Warehouses / Locations</h2>
                            <button class="btn btn-primary btn-sm" onclick="openWarehouseModal()">+ Add Warehouse</button>
                        </div>
                        <div class="table-responsive">
                            <table style="font-size: 0.875rem;">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Code</th>
                                        <th>Address</th>
                                        <th style="width: 50px;"></th>
                                    </tr>
                                </thead>
                                <tbody id="warehouse-list"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Categories -->
                    <div class="card">
                        <div class="flex-between mb-2" style="margin-bottom: 1rem;">
                            <h2 style="font-size: 1.1rem; font-weight: 700;">Product Categories</h2>
                            <button class="btn btn-primary btn-sm" onclick="addCategory()">+ Add</button>
                        </div>
                        <div id="category-list" class="flex-col gap-2"></div>
                    </div>
                </div>

                <div class="card mt-4" style="border-color: var(--danger); background: var(--card-danger-bg);">
                    <div class="flex-between">
                        <div>
                            <h3 style="color: var(--danger); margin-bottom: 0.5rem;">Data Management</h3>
                            <p class="text-muted" style="font-size: 0.875rem;">Force sync default data to Firestore if your database is empty.</p>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-primary" onclick="window.forceSeed()" style="background: var(--success); border-color: var(--success);">Force Cloud Sync</button>
                            <button class="btn" onclick="window.resetSystem()" style="background: var(--surface-muted); border-color: var(--danger); color: var(--danger);">Reset Session</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Warehouse Modal -->
    <div id="warehouse-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 100%; max-width: 450px;">
            <h2 style="margin-bottom: 1.5rem;">Save Warehouse</h2>
            <form id="warehouse-form">
                <div class="form-group">
                    <label>Warehouse Name</label>
                    <input type="text" id="w-name" required placeholder="e.g. Main Hub">
                </div>
                <div class="form-group">
                    <label>Shortcode</label>
                    <input type="text" id="w-code" required placeholder="e.g. WH-01">
                </div>
                <div class="form-group">
                    <label>Parent Location (Optional)</label>
                    <select id="w-parent" style="width: 100%; border: 1px solid var(--border-color); padding: 0.5rem; border-radius: 4px;">
                        <option value="">None (Top Level Warehouse)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="w-address" rows="2" placeholder="Full location address..."></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-light" onclick="closeWarehouseModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Warehouse</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module">
        import Storage from './js/storage.js';

        async function renderSettings() {
            try {
                const settings = await Storage.getSettings();
                const wList = document.getElementById('warehouse-list');
                const cList = document.getElementById('category-list');

                if (!wList || !cList) return;

                wList.innerHTML = settings.warehouses.map(w => `
                    <tr>
                        <td style="padding-left: ${w.parent ? '2rem' : '0.75rem'}">
                            ${w.parent ? '<i data-lucide="corner-down-right" style="width: 12px; margin-right: 5px; color: #94a3b8;"></i>' : ''}
                            <strong>${w.name}</strong>
                            ${w.parent ? `<span class="text-xs text-muted" style="font-size: 0.7rem; margin-left: 5px;">(in ${w.parent})</span>` : ''}
                        </td>
                        <td style="font-family: monospace;">${w.code || '-'}</td>
                        <td class="text-muted" style="font-size: 0.75rem;">${w.address || '-'}</td>
                        <td>
                            <i data-lucide="trash-2" style="width: 14px; cursor: pointer; color: var(--danger)" onclick="window.removeWarehouse('${w.name}')"></i>
                        </td>
                    </tr>
                `).join('');

                const parentSelect = document.getElementById('w-parent');
                if (parentSelect) {
                    parentSelect.innerHTML = '<option value="">None (Top Level Warehouse)</option>' + 
                        settings.warehouses
                            .filter(w => !w.parent)
                            .map(w => `<option value="${w.name}">${w.name}</option>`)
                            .join('');
                }

                cList.innerHTML = settings.categories.map(c => `
                    <div class="flex-between" style="padding: 0.5rem; background: var(--bg-body); border-radius: 4px; border: 1px solid var(--border-color);">
                        <span>${c}</span>
                        <i data-lucide="trash-2" style="width: 14px; cursor: pointer; color: var(--danger)" onclick="window.removeCategory('${c}')"></i>
                    </div>
                `).join('');
                
                if (window.lucide) window.lucide.createIcons();
            } catch (err) {
                console.error("Settings display error:", err);
            }
        }

        window.openWarehouseModal = () => document.getElementById('warehouse-modal').classList.remove('hidden');
        window.closeWarehouseModal = () => {
            document.getElementById('warehouse-modal').classList.add('hidden');
            document.getElementById('warehouse-form').reset();
        };

        window.forceSeed = async () => {
            try {
                alert("Attempting to sync default data to Firestore...");
                await Storage.seed();
                alert("Sync completed! Check your Firestore console.");
                await renderSettings();
            } catch (err) {
                alert("Sync failed: " + err.message);
            }
        };

        document.getElementById('warehouse-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const warehouse = {
                name: document.getElementById('w-name').value,
                code: document.getElementById('w-code').value.toUpperCase(),
                parent: document.getElementById('w-parent').value,
                address: document.getElementById('w-address').value
            };
            await Storage.saveWarehouse(warehouse);
            closeWarehouseModal();
            await renderSettings();
        });

        window.removeWarehouse = async (name) => {
            if (confirm(`Remove warehouse "${name}"? This might orphan products assigned to it.`)) {
                await Storage.removeWarehouse(name);
                await renderSettings();
            }
        };

        window.addCategory = async () => {
            const c = prompt("Enter Category Name:");
            if (c) {
                const settings = await Storage.getSettings();
                settings.categories.push(c);
                await Storage.saveSettings(settings);
                await renderSettings();
            }
        };

        window.removeCategory = async (c) => {
            if (confirm(`Remove category "${c}"?`)) {
                const settings = await Storage.getSettings();
                settings.categories = settings.categories.filter(items => items !== c);
                await Storage.saveSettings(settings);
                await renderSettings();
            }
        };

        window.resetSystem = async () => {
            window.App.confirm(
                "CRITICAL ACTION",
                "This will PERMANENTLY DELETE all your products, movements, and settings from the cloud database. This cannot be undone. Are you absolutely sure?",
                async () => {
                    try {
                        const loadingModal = document.createElement('div');
                        loadingModal.innerHTML = `
                            <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; color: white;">
                                <div style="text-align: center;">
                                    <div class="spinner mb-4"></div>
                                    <p>Wiping all cloud data... Please wait.</p>
                                </div>
                            </div>
                        `;
                        document.body.appendChild(loadingModal);

                        await Storage.wipeUserData();
                        localStorage.clear();
                        
                        // Sign out of Firebase
                        const { auth } = await import('./js/firebase-config.js');
                        await auth.signOut();
                        
                        window.location.href = 'login.html';
                    } catch (err) {
                        alert("Wipe failed: " + err.message);
                    }
                }
            );
        };

        document.addEventListener('DOMContentLoaded', renderSettings);
    </script>
</body>
</html>
