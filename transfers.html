<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Internal Transfers</h1>
                        <p class="text-muted">Move stock between warehouse locations</p>
                    </div>
                    <button class="btn btn-primary" onclick="window.openModal()">+ New Transfer</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref</th>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transfer-list"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h2 style="margin-bottom: 1.5rem;">New Transfer</h2>
            <form id="transfer-form">
                <div class="form-group">
                    <label>Product</label>
                    <select id="t-product" required></select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="t-qty" required min="1" value="1">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Source Location</label>
                        <select id="t-source" required></select>
                    </div>
                    <div class="form-group">
                        <label>Destination Location</label>
                        <select id="t-dest" required></select>
                    </div>
                </div>
                <div id="stock-error" class="badge badge-danger hidden" style="width:100%; margin-bottom: 1rem; text-align:center; padding: 0.5rem; display:block;">Insufficient stock at source!</div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-light" onclick="window.closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Process Transfer</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/transfers.js"></script>
</body>
</html>
