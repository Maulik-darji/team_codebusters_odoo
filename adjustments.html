<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjustments - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Inventory Adjustments</h1>
                        <p class="text-muted">Manually correct stock levels based on physical counts</p>
                    </div>
                    <button class="btn btn-primary" onclick="window.openModal()">+ New Adjustment</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref</th>
                                <th>Product</th>
                                <th>Recorded</th>
                                <th>Actual</th>
                                <th>Adjustment</th>
                                <th>Reason</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="adjustment-list"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h2 style="margin-bottom: 1.5rem;">New Adjustment</h2>
            <form id="adjustment-form">
                <div class="form-group">
                    <label>Product</label>
                    <select id="a-product" required onchange="window.updateRecordedQty()"></select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Recorded Quantity</label>
                        <input type="number" id="a-recorded" readonly style="background: #f1f3f5;">
                    </div>
                    <div class="form-group">
                        <label>Actual Quantity (Physical)</label>
                        <input type="number" id="a-actual" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Adjustment Reason</label>
                    <select id="a-reason">
                        <option>Inventory Count</option>
                        <option>Damaged Goods</option>
                        <option>Expired Stock</option>
                        <option>Theft/Loss</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-light" onclick="window.closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Apply Adjustment</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/adjustments.js"></script>
</body>
</html>
