<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Delivery Orders</h1>
                        <p class="text-muted">Ship goods to customers and decrease stock</p>
                    </div>
                    <div style="display:flex; gap: 10px; align-items:center;">
                        <div class="search-wrapper" style="position: relative; width: 250px;">
                            <i data-lucide="search" style="position: absolute; left: 10px; top: 8px; width: 16px; color: var(--text-muted);"></i>
                            <input type="text" id="delivery-search" placeholder="Search reference or customer..." style="padding-left: 2.5rem; height: 32px; width: 100%; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface); color: var(--text-main);">
                        </div>
                        <div style="display:flex; border: 1px solid var(--border-color); border-radius: 8px; overflow:hidden; background: var(--surface);">
                            <button id="view-list-btn" onclick="Delivery.setView('list')" title="List View"
                                style="padding: 8px 12px; background: var(--primary); color: white; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:0.85rem; transition: all 0.2s;">
                                <i data-lucide="list" style="width:15px; height:15px;"></i>
                            </button>
                            <button id="view-kanban-btn" onclick="Delivery.setView('kanban')" title="Kanban View"
                                style="padding: 8px 12px; background: transparent; color: var(--text-muted); border:none; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:0.85rem; transition: all 0.2s;">
                                <i data-lucide="layout-grid" style="width:15px; height:15px;"></i>
                            </button>
                        </div>
                        <button class="btn btn-primary" onclick="window.openModal()">+ New Delivery</button>
                    </div>
                </div>

                <div class="table-responsive" id="view-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref</th>
                                <th>Customer</th>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="delivery-list"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h2 style="margin-bottom: 1.5rem;">New Delivery</h2>
            <form id="delivery-form">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="d-customer" required placeholder="e.g. Acme Corp">
                </div>
                <div class="form-group">
                    <label>Product</label>
                    <select id="d-product" required></select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="d-qty" required min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Source Warehouse</label>
                    <select id="d-warehouse" required></select>
                </div>
                <div id="stock-error" class="badge badge-danger hidden" style="width:100%; margin-bottom: 1rem; text-align:center; padding: 0.5rem; display:block;">Insufficient stock!</div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-light" onclick="window.closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Reserve Items</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/delivery.js"></script>
</body>
</html>
