<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move History - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Stock Movement History</h1>
                        <p class="text-muted">Complete audit trail of all inventory operations</p>
                    </div>
                    <div class="flex gap-2 items-center" style="flex-wrap: wrap;">
                        <div class="form-group mb-0" style="margin-bottom: 0;">
                            <label style="font-size: 0.75rem;">From:</label>
                            <input type="date" id="start-date" style="height: 32px;">
                        </div>
                        <div class="form-group mb-0" style="margin-bottom: 0;">
                            <label style="font-size: 0.75rem;">To:</label>
                            <input type="date" id="end-date" style="height: 32px;">
                        </div>
                        <div class="form-group mb-0" style="margin-bottom: 0;">
                            <label style="font-size: 0.75rem;">Type:</label>
                            <select id="type-filter" style="height: 32px; background: var(--surface); color: var(--text-main); border-color: var(--border-color);">
                                <option value="">All Types</option>
                                <option value="Receipt">Receipts</option>
                                <option value="Delivery">Deliveries</option>
                                <option value="Transfer">Transfers</option>
                                <option value="Adjustment">Adjustments</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="apply-filter" style="height: 32px; margin-top: 15px;">Filter</button>
                        <div style="display:flex; gap: 10px; align-items:center; margin-top: 15px;">
                            <div style="display:flex; border: 1px solid var(--border-color); border-radius: 8px; overflow:hidden; background: var(--surface);">
                                <button id="view-list-btn" onclick="History.setView('list')" title="List View"
                                    style="padding: 8px 12px; background: var(--primary); color: white; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:0.85rem; transition: all 0.2s;">
                                    <i data-lucide="list" style="width:15px; height:15px;"></i>
                                </button>
                                <button id="view-kanban-btn" onclick="History.setView('kanban')" title="Kanban View"
                                    style="padding: 8px 12px; background: transparent; color: var(--text-muted); border:none; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:0.85rem; transition: all 0.2s;">
                                    <i data-lucide="layout-grid" style="width:15px; height:15px;"></i>
                                </button>
                            </div>
                            <button class="btn btn-light" id="delete-all-btn" style="height: 32px; color: var(--danger); border-color: var(--danger);" onclick="History.deleteAll()">
                                <i data-lucide="trash-2" style="width: 14px; height: 14px; margin-right: 4px;"></i> Delete All
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card" style="padding: 0;">
                    <div class="table-responsive" id="view-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Ref</th>
                                    <th>Type</th>
                                    <th>Product</th>
                                    <th>Qty Change</th>
                                    <th>Location</th>
                                    <th>Partner</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="history-list"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Custom Delete Confirmation Modal -->
    <div id="delete-confirm-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background: var(--card-bg, #fff); border-radius: 16px; padding: 2rem; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align:center;">
            <div style="width: 52px; height: 52px; background: #fee2e2; border-radius: 50%; display: flex; align-items:center; justify-content:center; margin: 0 auto 1rem;">
                <i data-lucide="trash-2" style="width:24px; height:24px; color: #ef4444;"></i>
            </div>
            <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem;" id="delete-modal-title">Delete Record</h3>
            <p style="color: var(--text-muted, #6b7280); font-size: 0.9rem; margin-bottom: 1.5rem;" id="delete-modal-msg">Are you sure you want to permanently delete this record? This cannot be undone.</p>
            <label style="display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:1.5rem; font-size:0.85rem; cursor:pointer;">
                <input type="checkbox" id="delete-remember-cb" style="width:16px; height:16px; cursor:pointer;">
                <span>Don't ask me again</span>
            </label>
            <div style="display:flex; gap: 12px; justify-content:center;">
                <button class="btn btn-light" id="delete-cancel-btn" style="min-width: 100px;">Cancel</button>
                <button class="btn btn-primary" id="delete-confirm-btn" style="min-width: 100px; background: #ef4444; border-color: #ef4444;">Delete</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/history.js"></script>

</body>
</html>
