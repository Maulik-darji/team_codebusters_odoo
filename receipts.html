<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipts - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside id="sidebar"></aside>
        <div id="main-panel">
            <header id="navbar"></header>
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Incoming Receipts</h1>
                        <p class="text-muted">Receive goods from suppliers and increase stock</p>
                    </div>
                    <div style="display:flex; gap: 10px; align-items:center;">
                        <div style="display:flex; border: 1px solid var(--border-color, #e5e7eb); border-radius: 8px; overflow:hidden;">
                            <button id="view-list-btn" onclick="Receipts.setView('list')" title="List View"
                                style="padding: 8px 12px; background: var(--primary); color: white; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:0.85rem;">
                                <i data-lucide="list" style="width:15px; height:15px;"></i>
                            </button>
                            <button id="view-kanban-btn" onclick="Receipts.setView('kanban')" title="Kanban View"
                                style="padding: 8px 12px; background: transparent; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:0.85rem;">
                                <i data-lucide="layout-grid" style="width:15px; height:15px;"></i>
                            </button>
                        </div>
                        <button class="btn btn-primary" onclick="window.openModal()">+ New Receipt</button>
                    </div>
                </div>

                <div class="table-responsive" id="view-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref</th>
                                <th>Supplier</th>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="receipt-list"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h2 style="margin-bottom: 1.5rem;">New Receipt</h2>
            <form id="receipt-form">
                <div class="form-group">
                    <label>Supplier Name</label>
                    <input type="text" id="r-supplier" required placeholder="e.g. Global Steels">
                </div>
                <div class="form-group">
                    <label>Product</label>
                    <select id="r-product" required></select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="r-qty" required min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Warehouse</label>
                    <select id="r-warehouse" required></select>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-light" onclick="window.closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Draft</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/receipts.js"></script>
</body>
</html>
