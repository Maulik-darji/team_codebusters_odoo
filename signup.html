<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body);
        }
        body { opacity: 0; transition: opacity 0.2s; }
        .auth-box {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-md);
        }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-logo { font-size: 1.75rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">StockPilot IMS</div>
                <p class="text-muted">Create your hackathon account</p>
            </div>

            <div id="alert-error" class="badge badge-danger hidden" style="width: 100%; margin-bottom: 1rem; text-align: center; display: block; padding: 0.75rem;"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label>Login ID / Username</label>
                    <input type="text" id="username" required placeholder="maulik_ims">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="emailid@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-toggle-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <i id="toggle-password" data-lucide="eye"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>

            <div style="margin: 1.5rem 0; text-align: center; font-size: 0.875rem;">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Login</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script>window.addEventListener('load', () => lucide.createIcons());</script>
</body>
</html>
