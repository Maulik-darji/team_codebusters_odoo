<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StockPilot IMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar and Navbar will be injected by app.js -->
        <aside id="sidebar"></aside>
        
        <div id="main-panel">
            <header id="navbar"></header>
            
            <main id="content">
                <div class="flex-between mb-4" style="margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.5rem; font-weight: 700;">Inventory Overview</h1>
                        <p class="text-muted">Real-time stock analytics and movements</p>
                    </div>
                    <div class="flex gap-2">
                        <select class="form-control" style="width: auto;" id="warehouse-filter">
                            <option value="all">All Warehouses</option>
                        </select>
                    </div>
                </div>

                <!-- KPI Cards -->
                <div class="kpi-grid">
                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: var(--primary-light); color: var(--primary);">
                            <i data-lucide="package"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Total Stock</h3>
                            <div class="value" id="kpi-total-stock">0</div>
                        </div>
                    </div>
                    
                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: var(--badge-warning-bg); color: var(--badge-warning-text);">
                            <i data-lucide="alert-triangle"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Low Stock</h3>
                            <div class="value" id="kpi-low-stock">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: var(--badge-danger-bg); color: var(--badge-danger-text);">
                            <i data-lucide="x-circle"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Out of Stock</h3>
                            <div class="value" id="kpi-out-stock">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card" style="cursor: pointer;" onclick="location.href='receipts.html'">
                        <div class="kpi-icon" style="background: var(--badge-info-bg); color: var(--badge-info-text);">
                            <i data-lucide="arrow-down-to-line"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Pending Receipts</h3>
                            <div class="value" id="kpi-pending-receipts">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card" style="cursor: pointer;" onclick="location.href='delivery.html'">
                        <div class="kpi-icon" style="background: var(--primary-light); color: var(--primary);">
                            <i data-lucide="arrow-up-from-line"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Pending Delivery</h3>
                            <div class="value" id="kpi-pending-delivery">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card" style="cursor: pointer;" onclick="location.href='transfers.html'">
                        <div class="kpi-icon" style="background: var(--surface-muted); color: var(--text-muted);">
                            <i data-lucide="arrow-right-left"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Scheduled Transfers</h3>
                            <div class="value" id="kpi-scheduled-transfers">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: var(--badge-success-bg); color: var(--badge-success-text);">
                            <i data-lucide="check-circle"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Accepted Receipts</h3>
                            <div class="value" id="kpi-accepted-receipts">0</div>
                        </div>
                    </div>

                    <div class="card kpi-card">
                        <div class="kpi-icon" style="background: var(--badge-danger-bg); color: var(--badge-danger-text);">
                            <i data-lucide="alert-circle"></i>
                        </div>
                        <div class="kpi-info">
                            <h3>Rejected Receipts</h3>
                            <div class="value" id="kpi-rejected-receipts">0</div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <div class="flex-between mb-2">
                        <h2 style="font-size: 1.1rem; font-weight: 700;">Recent Movement Ledger</h2>
                        <select id="status-filter" class="form-control" style="width: auto; height: 32px;">
                            <option value="all">All Status</option>
                            <option value="Ready">Ready</option>
                            <option value="Done">Done</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Ref</th>
                                    <th>Operation</th>
                                    <th>Product</th>
                                    <th>Qty Change</th>
                                    <th>Location</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="recent-movements">
                                <!-- Ledger rows will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
